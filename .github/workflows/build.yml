name: Build Marsh OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            flex \
            libssl-dev \
            libncurses-dev \
            unzip \
            wget \
            cpio \
            rsync \
            mtools \
            xorriso \
            isolinux \
            libelf-dev \
            libgmp-dev \
            libmpc-dev \
            libmpfr-dev \
            gcc \
            g++ \
            make \
            perl \
            git \
            file

      - name: Download Buildroot
        run: |
          wget https://buildroot.org/downloads/buildroot-2024.02.9.tar.gz
          tar xf buildroot-2024.02.9.tar.gz
          rm -rf buildroot
          mv buildroot-2024.02.9 buildroot

      - name: Prepare configuration
        run: |
          cp marsh_defconfig buildroot/configs/marsh_defconfig
          mkdir -p buildroot/board/marsh
          cp -r board/marsh/* buildroot/board/marsh/

      - name: Configure Buildroot
        run: |
          cd buildroot
          make marsh_defconfig
          echo 'BR2_ROOTFS_POST_BUILD_SCRIPT="board/marsh/post-build.sh"' >> .config
          make olddefconfig

      - name: Build
        run: |
          cd buildroot
          make -j$(nproc)

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: marsh-os-iso
          path: buildroot/output/images/*.iso
