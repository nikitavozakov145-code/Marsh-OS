name: Build Marsh OS (Void rebrand) - диагностика

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso isolinux mtools wget curl grep

      - name: Get latest Void ISO URL
        run: |
          BASE_URL="https://repo-default.voidlinux.org/live/current"
          INDEX=$(curl -s "$BASE_URL/")
          LATEST_FILE=$(echo "$INDEX" | grep -oP 'href="\K[^"]*\.iso' | grep 'void-live-x86_64' | sort | tail -1)
          if [ -z "$LATEST_FILE" ]; then
            echo "Не удалось найти ISO-файл."
            exit 1
          fi
          echo "Найден файл: $LATEST_FILE"
          wget -O void.iso "$BASE_URL/$LATEST_FILE"

      - name: Diagnostic - show ISO contents
        run: |
          mkdir mnt
          sudo mount -o loop void.iso mnt
          echo "=== Содержимое ISO ==="
          find mnt -type f | head -40
          echo "=== squashfs / initrd ==="
          find mnt -name "*.squashfs" -o -name "*.img" -o -name "initrd*" 2>/dev/null
          sudo umount mnt
          # Останавливаем, чтобы увидеть вывод
          exit 0

      # Дальнейшие шаги пока пропущены — добавим после уточнения структуры.
