name: Build Marsh OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses-dev \
            rsync \
            bc \
            unzip \
            wget \
            cpio \
            python3 \
            libelf-dev \
            libssl-dev \
            bison \
            flex \
            git

      - name: Download Buildroot
        run: |
          git clone --depth 1 --branch 2024.02.9 https://github.com/buildroot/buildroot.git buildroot

      - name: Prepare configuration
        run: |
          cp marsh_defconfig buildroot/configs/marsh_defconfig
          mkdir -p buildroot/board/marsh
          if [ -d "board/marsh" ]; then 
            cp -r board/marsh/* buildroot/board/marsh/
          fi

      - name: Configure Buildroot
        run: |
          cd buildroot
          make marsh_defconfig
          sed -i '/BR2_ROOTFS_POST_BUILD_SCRIPT/d' .config
          echo 'BR2_ROOTFS_POST_BUILD_SCRIPT="board/marsh/post-build.sh"' >> .config
          make olddefconfig

      - name: Download source packages
        run: |
          cd buildroot
          make source

      - name: Build
        run: |
          cd buildroot
          make
