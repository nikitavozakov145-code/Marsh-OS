name: Build Marsh OS (Void rebrand)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso mtools wget curl grep e2fsprogs

      - name: Get latest Void ISO URL
        run: |
          BASE_URL="https://repo-default.voidlinux.org/live/current"
          INDEX=$(curl -s "$BASE_URL/")
          LATEST_FILE=$(echo "$INDEX" | grep -oP 'href="\K[^"]*\.iso' | grep 'void-live-x86_64' | sort | tail -1)
          if [ -z "$LATEST_FILE" ]; then
            echo "Не удалось найти ISO-файл."
            exit 1
          fi
          echo "Найден файл: $LATEST_FILE"
          wget -O void.iso "$BASE_URL/$LATEST_FILE"

      - name: Extract and rebrand
        run: |
          mkdir -p iso mnt rootfs-ext4 marsh-iso
          sudo mount -o loop void.iso mnt
          # Копируем всё содержимое ISO во временную папку
          sudo cp -a mnt/. marsh-iso/
          sudo umount mnt

          cd marsh-iso

          # Распаковываем LiveOS/squashfs.img → получаем ext4-образ
          sudo unsquashfs -d ../rootfs-squash LiveOS/squashfs.img
          EXT4_IMG=$(ls ../rootfs-squash/LiveOS/ext3fs.img 2>/dev/null || ls ../rootfs-squash/rootfs.img 2>/dev/null || ls ../rootfs-squash/*.img)
          echo "Найден образ ext4: $EXT4_IMG"

          mkdir -p ../rootfs-ext4
          sudo mount -o loop "$EXT4_IMG" ../rootfs-ext4

          # Замена бренда в корневой ФС
          sudo sed -i 's/NAME="void"/NAME="marsh"/' ../rootfs-ext4/etc/os-release
          sudo sed -i 's/ID=void/ID=marsh/' ../rootfs-ext4/etc/os-release
          sudo sed -i 's/PRETTY_NAME="Void Linux"/PRETTY_NAME="Marsh OS"/' ../rootfs-ext4/etc/os-release
          echo "Marsh OS \\r \\l" | sudo tee ../rootfs-ext4/etc/issue

          sudo umount ../rootfs-ext4

          # Обновляем squashfs.img
          sudo rm LiveOS/squashfs.img
          sudo mksquashfs ../rootfs-squash LiveOS/squashfs.img -comp xz -noappend

          # Замена в загрузочных меню (если есть)
          if [ -f boot/grub/grub.cfg ]; then
            sudo sed -i 's/Void Linux/Marsh OS/g' boot/grub/grub.cfg
          fi
          if [ -f boot/grub/grub_void.cfg ]; then
            sudo sed -i 's/Void Linux/Marsh OS/g' boot/grub/grub_void.cfg
          fi
          if [ -f isolinux/isolinux.cfg ]; then
            sudo sed -i 's/Void/Marsh/g' isolinux/isolinux.cfg
          fi
          if [ -f boot/isolinux/isolinux.cfg ]; then
            sudo sed -i 's/Void/Marsh/g' boot/isolinux/isolinux.cfg
          fi

      - name: Create new ISO (clone boot info from original)
        run: |
          # Делаем все файлы читаемыми
          sudo chmod -R a+rX marsh-iso
          # Клонируем загрузочную информацию из оригинального ISO
          xorriso -indev void.iso -outdev marsh-os.iso -map marsh-iso / -boot_image any replay
          # Проверим, что ISO создался
          ls -lh marsh-os.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: marsh-os-iso
          path: marsh-os.iso
