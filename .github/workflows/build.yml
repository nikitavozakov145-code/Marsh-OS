name: Build Marsh OS (Void rebrand)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso isolinux mtools wget curl grep

      - name: Get latest Void ISO URL
        run: |
          BASE_URL="https://repo-default.voidlinux.org/live/current"
          INDEX=$(curl -s "$BASE_URL/")
          LATEST_FILE=$(echo "$INDEX" | grep -oP 'href="\K[^"]*\.iso' | grep 'void-live-x86_64' | sort | tail -1)
          if [ -z "$LATEST_FILE" ]; then
            echo "Не удалось найти ISO-файл."
            exit 1
          fi
          echo "Найден файл: $LATEST_FILE"
          wget -O void.iso "$BASE_URL/$LATEST_FILE"

      - name: Extract and rebrand
        run: |
          mkdir iso mnt rootfs marsh-iso
          sudo mount -o loop void.iso mnt
          # Копируем содержимое ISO с сохранением прав (sudo)
          sudo cp -a mnt/. marsh-iso/
          sudo umount mnt

          cd marsh-iso
          # Распаковываем корневую ФС с sudo
          sudo unsquashfs -d ../rootfs live/rootfs.squashfs

          # Меняем название в файлах (нужен sudo для записи)
          sudo sed -i 's/NAME="void"/NAME="marsh"/' ../rootfs/etc/os-release
          sudo sed -i 's/ID=void/ID=marsh/' ../rootfs/etc/os-release
          sudo sed -i 's/PRETTY_NAME="Void Linux"/PRETTY_NAME="Marsh OS"/' ../rootfs/etc/os-release
          echo "Marsh OS \\r \\l" | sudo tee ../rootfs/etc/issue

          # Пересоздаём squashfs
          sudo mksquashfs ../rootfs live/rootfs.squashfs -comp xz -noappend

          # Правим загрузчик
          sudo sed -i 's/Void Linux/Marsh OS/g' boot/grub/grub.cfg
          sudo sed -i 's/Void/Marsh/g' isolinux/isolinux.cfg

      - name: Create new ISO
        run: |
          cd marsh-iso
          xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "MARSH_OS" \
            -eltorito-boot isolinux/isolinux.bin \
            -eltorito-catalog isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -eltorito-alt-boot -e boot/efi.img -no-emul-boot -isohybrid-gpt-basdat \
            -output ../marsh-os.iso .

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: marsh-os-iso
          path: marsh-os.iso
